app-id: dev.wailbrew.WailBrew
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
  - org.freedesktop.Sdk.Extension.node22

command: WailBrew

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=host
  - --talk-name=org.freedesktop.Flatpak

build-options:
  build-args:
    - --share=network
  append-path: /usr/lib/sdk/golang/bin:/usr/lib/sdk/node22/bin:/app/bin
  env:
    GOPATH: /app/go
    NPM_CONFIG_PREFIX: /app
    GOWORK: off

modules:
  - name: wails
    buildsystem: simple
    build-commands:
      - cd v2/cmd/wails && GOWORK=off go build -o /app/bin/wails
      - chmod -R u+w /app/go || true
    sources:
      - type: archive
        url: https://github.com/wailsapp/wails/archive/refs/tags/v2.13.0.tar.gz
        sha256: 08b8135f6dce18be6016046aa8e75607e998f4f4687154f7d9ebb1bb03666756

  - name: wailbrew
    buildsystem: simple
    build-commands:
      - npm install -g pnpm
      - pnpm config set store-dir /app/.pnpm-store
      - VERSION=$(node -p "require('./frontend/package.json').version")
      - /app/bin/wails build -tags webkit2_41 -ldflags "-X main.Version=$VERSION"
      - install -Dm755 build/bin/WailBrew /app/bin/WailBrew
      - chmod -R u+w /app/go /app/.pnpm-store || true
    sources:
      - type: dir
        path: ..
